[alembic]
script_location = alembic
prepend_sys_path = .
; Placeholder only. The real URL is loaded at runtime from
; GREENLINK_DATABASE_URL via alembic/env.py (set_main_option).
sqlalchemy.url = postgresql+psycopg://USER:PASSWORD@HOST:5432/DBNAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
