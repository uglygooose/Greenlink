<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Score Entry | GreenLink</title>
    <meta name="theme-color" content="#06110c" />
    <link rel="icon" type="image/png" href="assets/favicon.png?v=2" />
    <link rel="shortcut icon" href="assets/favicon.png?v=2" />
    <link rel="apple-touch-icon" href="assets/favicon.png?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <script src="club-config.js"></script>
    <style>
        :root {
            --ops-green: #2c7a5b;
            --ops-bg: #f3f7f4;
            --ops-surface: rgba(255, 255, 255, 0.96);
            --ops-surface-soft: rgba(231, 244, 238, 0.82);
            --ops-border: #dbe5df;
            --ops-text: #24323d;
            --ops-muted: #70808f;
            --ops-shadow: 0 22px 48px rgba(31, 50, 44, 0.10);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(44, 122, 91, 0.08), transparent 26%),
                linear-gradient(180deg, #fbfcfb 0%, var(--ops-bg) 100%);
            color: var(--ops-text);
            font-family: "Inter", system-ui, sans-serif;
        }

        .overlay { display: none; }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 18px 40px;
        }

        .header-card,
        .card {
            background: var(--ops-surface);
            border: 1px solid var(--ops-border);
            border-radius: 22px;
            box-shadow: var(--ops-shadow);
        }

        .header-card {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            padding: 22px 24px;
            margin-bottom: 18px;
            background: rgba(255, 255, 255, 0.84);
            backdrop-filter: blur(16px);
        }

        .logo {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            border: 1px solid var(--ops-border);
            object-fit: cover;
            background: #f8fbf9;
        }

        .header-card h1,
        .card h2,
        .card h3 {
            margin: 0;
            font-family: "Manrope", "Inter", system-ui, sans-serif;
            color: var(--ops-text);
        }

        .header-card h1 {
            font-size: 30px;
            font-weight: 800;
        }

        .header-card p,
        .card p {
            margin: 0;
            color: var(--ops-muted);
        }

        .card {
            padding: 22px 24px;
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            border: 1px solid var(--ops-border);
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 15px;
            color: var(--ops-text);
            background: #fff;
            font-family: "Inter", system-ui, sans-serif;
        }

        button {
            appearance: none;
            border: 1px solid var(--ops-border);
            background: #fff;
            color: var(--ops-text);
            border-radius: 14px;
            padding: 12px 18px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(31, 50, 44, 0.06);
            font-family: "Inter", system-ui, sans-serif;
        }

        .primary-btn {
            background: var(--ops-green);
            color: #fff;
            border-color: var(--ops-green);
        }

        .muted-btn {
            background: rgba(255, 255, 255, 0.94);
            color: var(--ops-muted);
        }

        .scorecard-meta {
            display: grid;
            gap: 6px;
        }

        .scorecard-table-wrap {
            margin-bottom: 20px;
            border: 1px solid var(--ops-border);
            border-radius: 18px;
            overflow: hidden;
            background: #fff;
        }

        .scorecard-table {
            width: 100%;
            border-collapse: collapse;
        }

        .scorecard-table thead tr {
            background: #f7faf8;
            color: var(--ops-muted);
        }

        .scorecard-table th,
        .scorecard-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #edf2ef;
            text-align: center;
        }

        .scorecard-table th {
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 800;
        }

        .score-input {
            width: 72px;
            padding: 10px 8px;
            text-align: center;
            border-radius: 12px;
        }

        .score-total {
            background: var(--ops-surface-soft);
            padding: 16px 18px;
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid rgba(44, 122, 91, 0.12);
        }

        .score-total strong {
            font-family: "Manrope", "Inter", system-ui, sans-serif;
            font-size: 22px;
        }

        .footer-actions {
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="container fade-in">
        <div class="header-card fade-in-slow">
            <img src="assets/logo.png" alt="Club Logo" class="logo" data-club-logo />
            <h1>Score Entry</h1>
            <p>Enter a completed scorecard</p>
        </div>

        <div class="card fade-in">
            <h2>Select Booking</h2>
            <input type="number" id="bookingId" placeholder="Enter Booking ID" />
            <button class="primary-btn" onclick="loadRound()">Load Scorecard</button>
        </div>

        <div id="scorecardSection" style="display: none;">
            <div class="card fade-in">
                <h2>Player: <span id="playerName"></span></h2>
                <div class="scorecard-meta">
                    <p>Booking ID: <span id="displayBookingId"></span></p>
                    <p>Round ID: <span id="roundId"></span></p>
                </div>
            </div>

            <div class="card fade-in">
                <h3>18-Hole Scorecard</h3>
                <div class="scorecard-table-wrap">
                    <table class="scorecard-table">
                        <thead>
                            <tr>
                                <th>Hole</th>
                                <th>Par</th>
                                <th>Score</th>
                            </tr>
                        </thead>
                        <tbody id="scorecardTable"></tbody>
                    </table>
                </div>

                <div class="score-total">
                    <strong>Total Score: <span id="totalScore">0</span></strong>
                </div>

                <button class="primary-btn" onclick="submitScores()" style="font-size: 16px; padding: 15px 20px;">
                    Submit Scorecard
                </button>
            </div>
        </div>

        <div class="footer-actions">
            <button class="muted-btn" onclick="goBack()">Back to Dashboard</button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("token");
        if (!token) window.location.href = "/frontend/index.html";

        const API_BASE = window.location.origin;
        let currentBooking = null;
        let currentRound = null;

        // Standard par setup (customize per club if needed).
        const parValues = [4, 4, 3, 5, 4, 4, 3, 5, 4, 4, 3, 5, 4, 4, 3, 5, 4, 4];

        async function apiRequest(path, options = {}) {
            const headers = new Headers(options.headers || {});
            headers.set("Authorization", `Bearer ${token}`);
            if (options.body != null && !headers.has("Content-Type")) {
                headers.set("Content-Type", "application/json");
            }

            const response = await fetch(`${API_BASE}${path}`, { ...options, headers });
            const raw = await response.text();
            let data = null;
            try {
                data = raw ? JSON.parse(raw) : null;
            } catch {
                data = null;
            }

            if (!response.ok) {
                const detail = data?.detail || raw || `Request failed (${response.status})`;
                throw new Error(String(detail));
            }
            return data;
        }

        async function loadBookingDetail(bookingId) {
            const id = Number(bookingId || 0);
            if (id <= 0) throw new Error("Enter a valid booking ID.");

            try {
                return await apiRequest(`/api/admin/bookings/${id}`);
            } catch (error) {
                // Fallback for environments where admin endpoints are unavailable.
                const response = await apiRequest("/scoring/my-bookings?days=180&include_past=true");
                const rows = Array.isArray(response?.bookings) ? response.bookings : [];
                const row = rows.find((item) => Number(item?.booking_id || 0) === id);
                if (!row) throw error;
                return {
                    id: Number(row.booking_id || 0),
                    player_name: row.player_name || "Unknown player",
                    status: row.status || "booked",
                    round: row.round || null,
                };
            }
        }

        function setText(id, value) {
            const el = document.getElementById(id);
            if (el) el.textContent = String(value ?? "");
        }

        async function loadRound() {
            const bookingId = Number(document.getElementById("bookingId").value || 0);
            if (bookingId <= 0) {
                alert("Please enter a valid booking ID.");
                return;
            }

            try {
                const booking = await loadBookingDetail(bookingId);
                const status = String(booking?.status || "").toLowerCase();
                if (!["checked_in", "completed", "booked"].includes(status)) {
                    alert(`Booking status '${status || "unknown"}' cannot be scored.`);
                    return;
                }

                currentBooking = booking;
                currentRound = booking?.round || null;
                displayScorecard();
            } catch (error) {
                alert(`Unable to load booking: ${error?.message || "Unknown error"}`);
            }
        }

        function displayScorecard() {
            document.getElementById("scorecardSection").style.display = "block";
            setText("playerName", currentBooking?.player_name || "Unknown player");
            setText("displayBookingId", currentBooking?.id || "");
            setText("roundId", currentRound?.id || currentRound?.handicap_sa_round_id || "Pending");

            const table = document.getElementById("scorecardTable");
            let rows = "";
            for (let hole = 1; hole <= 18; hole += 1) {
                rows += `
                    <tr>
                        <td>${hole}</td>
                        <td>${parValues[hole - 1]}</td>
                        <td>
                            <input
                                type="number"
                                id="score_${hole}"
                                min="1"
                                max="15"
                                class="score-input"
                                onchange="calculateTotal()"
                            />
                        </td>
                    </tr>
                `;
            }
            table.innerHTML = rows;
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            for (let hole = 1; hole <= 18; hole += 1) {
                const score = Number(document.getElementById(`score_${hole}`)?.value || 0);
                if (Number.isFinite(score)) total += score;
            }
            setText("totalScore", total);
        }

        async function submitScores() {
            if (!currentBooking?.id) {
                alert("Load a booking first.");
                return;
            }

            const scores = [];
            for (let hole = 1; hole <= 18; hole += 1) {
                const value = Number(document.getElementById(`score_${hole}`)?.value || 0);
                if (!Number.isInteger(value) || value < 1) {
                    alert(`Please enter a valid score for hole ${hole}.`);
                    return;
                }
                scores.push({ hole, par: parValues[hole - 1], score: value });
            }

            try {
                const payload = {
                    booking_id: Number(currentBooking.id),
                    scores_json: JSON.stringify(scores),
                };
                const data = await apiRequest("/scoring/submit", {
                    method: "POST",
                    body: JSON.stringify(payload),
                });
                const total = scores.reduce((sum, item) => sum + item.score, 0);
                alert(
                    `Scores submitted successfully.\n\nTotal: ${total}\nRound ID: ${data?.round_id || "N/A"}`
                );

                document.getElementById("bookingId").value = "";
                document.getElementById("scorecardSection").style.display = "none";
                currentBooking = null;
                currentRound = null;
            } catch (error) {
                alert(`Error submitting scores: ${error?.message || "Please try again."}`);
            }
        }

        function goBack() {
            window.location.href = "/frontend/dashboard.html";
        }
    </script>
</body>
</html>
