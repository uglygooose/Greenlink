<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check-in | GreenLink</title>
    <meta name="theme-color" content="#06110c" />
    <link rel="icon" type="image/png" href="assets/favicon.png?v=2" />
    <link rel="shortcut icon" href="assets/favicon.png?v=2" />
    <link rel="apple-touch-icon" href="assets/favicon.png?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <script src="club-config.js"></script>
    <style>
        :root {
            --ops-green: #2c7a5b;
            --ops-green-dark: #225f47;
            --ops-bg: #f3f7f4;
            --ops-surface: rgba(255, 255, 255, 0.96);
            --ops-surface-soft: rgba(231, 244, 238, 0.82);
            --ops-border: #dbe5df;
            --ops-text: #24323d;
            --ops-muted: #70808f;
            --ops-danger-bg: #fff1f1;
            --ops-danger-fg: #b42318;
            --ops-shadow: 0 22px 48px rgba(31, 50, 44, 0.10);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(44, 122, 91, 0.08), transparent 26%),
                linear-gradient(180deg, #fbfcfb 0%, var(--ops-bg) 100%);
            color: var(--ops-text);
            font-family: "Inter", system-ui, sans-serif;
        }

        .overlay { display: none; }

        .container {
            max-width: 1080px;
            margin: 0 auto;
            padding: 20px 18px 40px;
        }

        .header-card,
        .card {
            background: var(--ops-surface);
            border: 1px solid var(--ops-border);
            border-radius: 22px;
            box-shadow: var(--ops-shadow);
        }

        .header-card {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            padding: 22px 24px;
            margin-bottom: 18px;
            background: rgba(255, 255, 255, 0.84);
            backdrop-filter: blur(16px);
        }

        .logo {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            border: 1px solid var(--ops-border);
            object-fit: cover;
            background: #f8fbf9;
        }

        .header-card h1,
        .card h2,
        .card h3 {
            margin: 0;
            font-family: "Manrope", "Inter", system-ui, sans-serif;
            color: var(--ops-text);
        }

        .header-card h1 {
            font-size: 30px;
            font-weight: 800;
        }

        .header-card p,
        .card p {
            margin: 0;
            color: var(--ops-muted);
        }

        .card {
            padding: 22px 24px;
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ops-muted);
        }

        input {
            width: 100%;
            border: 1px solid var(--ops-border);
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 15px;
            color: var(--ops-text);
            background: #fff;
            font-family: "Inter", system-ui, sans-serif;
        }

        button {
            appearance: none;
            border: 1px solid var(--ops-border);
            background: #fff;
            color: var(--ops-text);
            border-radius: 14px;
            padding: 12px 18px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(31, 50, 44, 0.06);
            font-family: "Inter", system-ui, sans-serif;
        }

        .primary-btn {
            background: var(--ops-green);
            color: #fff;
            border-color: var(--ops-green);
        }

        .muted-btn {
            background: rgba(255, 255, 255, 0.94);
            color: var(--ops-muted);
        }

        .booking-results {
            display: grid;
            gap: 12px;
        }

        .status-message {
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid var(--ops-border);
            background: var(--ops-surface-soft);
            color: var(--ops-green-dark);
            font-weight: 600;
        }

        .status-message.error {
            background: var(--ops-danger-bg);
            color: var(--ops-danger-fg);
            border-color: rgba(180, 35, 24, 0.12);
        }

        .booking-result {
            border: 1px solid var(--ops-border);
            border-radius: 18px;
            background: #fff;
            padding: 16px 18px;
            box-shadow: 0 14px 30px rgba(31, 50, 44, 0.08);
        }

        .booking-result strong {
            display: block;
            font-family: "Manrope", "Inter", system-ui, sans-serif;
            font-size: 20px;
            margin-bottom: 8px;
        }

        .result-meta {
            display: grid;
            gap: 4px;
            color: var(--ops-muted);
            font-size: 14px;
        }

        .result-action {
            margin-top: 12px;
        }

        .footer-actions {
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="container fade-in">
        <div class="header-card fade-in-slow">
            <img src="assets/logo.png" alt="Club Logo" class="logo" data-club-logo />
            <h1>Player Check-in</h1>
            <p>Scan handicap card or enter GreenLink ID</p>
        </div>

        <div class="card fade-in">
            <h2>Quick Check-in</h2>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Scan Handicap Card or GreenLink ID</label>
                <input
                    type="text"
                    id="cardScanner"
                    placeholder="Place card on scanner or type ID..."
                    autofocus
                    style="font-size: 18px; padding: 15px;"
                />
                <p style="font-size: 13px; color: #666; margin-top: 5px;">
                    Tip: focus this field, then scan the player's card.
                </p>
            </div>

            <button class="primary-btn" onclick="searchBooking()" style="margin-bottom: 20px;">Search Booking</button>

            <div id="bookingResults" class="booking-results"></div>
        </div>

        <div class="card fade-in">
            <h3>Manual Booking Lookup</h3>
            <input type="number" id="bookingId" placeholder="Enter Booking ID" />
            <button class="primary-btn" onclick="checkinById()">Check-in by ID</button>
        </div>

        <div class="footer-actions">
            <button class="muted-btn" onclick="goBack()">Back to Dashboard</button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("token");
        if (!token) window.location.href = "/frontend/index.html";

        const API_BASE = window.location.origin;

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function toYmd(dateObj) {
            const d = dateObj instanceof Date ? dateObj : new Date(dateObj);
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, "0");
            const day = String(d.getDate()).padStart(2, "0");
            return `${y}-${m}-${day}`;
        }

        function addDays(dateObj, days) {
            const d = new Date(dateObj);
            d.setDate(d.getDate() + Number(days || 0));
            return d;
        }

        function dayRange(dateObj) {
            const startDate = new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate(), 0, 0, 0);
            const endDate = new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate() + 1, 0, 0, 0);
            return {
                start: `${toYmd(startDate)}T00:00:00`,
                end: `${toYmd(endDate)}T00:00:00`,
            };
        }

        function statusValue(status) {
            return String(status || "").trim().toLowerCase();
        }

        async function apiRequest(path, options = {}) {
            const headers = new Headers(options.headers || {});
            headers.set("Authorization", `Bearer ${token}`);
            if (options.body != null && !headers.has("Content-Type")) {
                headers.set("Content-Type", "application/json");
            }

            const response = await fetch(`${API_BASE}${path}`, { ...options, headers });
            const raw = await response.text();
            let data = null;
            try {
                data = raw ? JSON.parse(raw) : null;
            } catch {
                data = null;
            }

            if (!response.ok) {
                const detail = data?.detail || raw || `Request failed (${response.status})`;
                throw new Error(String(detail));
            }
            return data;
        }

        async function loadTeeSheetForDate(dateObj) {
            const range = dayRange(dateObj);
            return apiRequest(
                `/tsheet/range?start=${encodeURIComponent(range.start)}&end=${encodeURIComponent(range.end)}`
            );
        }

        document.getElementById("cardScanner").addEventListener("keypress", (event) => {
            if (event.key === "Enter") {
                searchBooking();
            }
        });

        async function searchBooking() {
            const cardValue = document.getElementById("cardScanner").value.trim();
            const results = document.getElementById("bookingResults");
            if (!cardValue) {
                alert("Please scan a card or enter an ID.");
                return;
            }

            results.innerHTML = "<div class=\"status-message\">Searching bookings...</div>";

            try {
                const searchOffsets = [0, 1, -1, 2, -2];
                const matches = [];
                const seenIds = new Set();

                for (const offset of searchOffsets) {
                    const targetDate = addDays(new Date(), offset);
                    const teeTimes = await loadTeeSheetForDate(targetDate);
                    for (const tee of (Array.isArray(teeTimes) ? teeTimes : [])) {
                        const bookings = Array.isArray(tee?.bookings) ? tee.bookings : [];
                        for (const booking of bookings) {
                            const status = statusValue(booking?.status);
                            if (status === "cancelled" || status === "no_show") continue;

                            const isMatch =
                                String(booking?.club_card || "").trim() === cardValue ||
                                String(booking?.handicap_number || "").trim() === cardValue ||
                                String(booking?.greenlink_id || "").trim() === cardValue;
                            if (!isMatch) continue;

                            const bookingId = Number(booking?.id || 0);
                            if (bookingId > 0 && !seenIds.has(bookingId)) {
                                seenIds.add(bookingId);
                                matches.push(booking);
                            }
                        }
                    }
                }

                displayResults(matches);
            } catch (error) {
                results.innerHTML = `<div class="status-message error">${escapeHtml(error?.message || "Search failed.")}</div>`;
            }
        }

        function displayResults(bookings) {
            const results = document.getElementById("bookingResults");

            if (!Array.isArray(bookings) || bookings.length === 0) {
                results.innerHTML = "<div class=\"status-message error\">No active bookings found for this card.</div>";
                return;
            }

            const html = bookings
                .map((booking) => {
                    const id = Number(booking?.id || 0);
                    const playerName = escapeHtml(booking?.player_name || "Unknown player");
                    const email = escapeHtml(booking?.player_email || "N/A");
                    const status = statusValue(booking?.status);
                    const statusLabel = escapeHtml(status || "booked");

                    let actionHtml = `<span class="status-message" style="display:inline-flex; padding:10px 12px;">Checked in</span>`;
                    if (status === "booked") {
                        actionHtml = `<button class="primary-btn result-action" onclick="performCheckin(${id})">Check In</button>`;
                    } else if (status === "checked_in") {
                        actionHtml = `<button class="primary-btn result-action" onclick="performCheckin(${id})">Open Round</button>`;
                    }

                    return `
                        <div class="booking-result">
                            <strong>${playerName}</strong>
                            <div class="result-meta">
                                <span>Email: ${email}</span>
                                <span>Status: <strong>${statusLabel}</strong></span>
                                <span>Booking ID: ${id}</span>
                            </div>
                            ${actionHtml}
                        </div>
                    `;
                })
                .join("");

            results.innerHTML = html;
        }

        async function performCheckin(bookingId) {
            const id = Number(bookingId || 0);
            if (id <= 0) {
                alert("Invalid booking ID.");
                return;
            }

            try {
                const data = await apiRequest(`/checkin/${id}`, { method: "POST" });
                const playerName = data?.booking?.player_name || "Unknown player";
                const roundId = data?.round?.handicap_sa_round_id || data?.handicap_sa?.round_id || "Pending";
                alert(`Check-in successful.\n\nPlayer: ${playerName}\nHandicap SA Round: ${roundId}`);
                document.getElementById("cardScanner").value = "";
                document.getElementById("bookingResults").innerHTML = "";
            } catch (error) {
                alert(`Check-in failed: ${error?.message || "Please try again."}`);
            }
        }

        async function checkinById() {
            const id = Number(document.getElementById("bookingId").value || 0);
            if (id <= 0) {
                alert("Enter a valid booking ID.");
                return;
            }
            await performCheckin(id);
        }

        function goBack() {
            window.location.href = "/frontend/dashboard.html";
        }
    </script>
</body>
</html>
