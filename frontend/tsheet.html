<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tee Sheet</title>
  <meta name="theme-color" content="#06110c" />
  <link rel="icon" type="image/png" href="assets/favicon.png?v=2" />
  <link rel="shortcut icon" href="assets/favicon.png?v=2" />
  <link rel="apple-touch-icon" href="assets/favicon.png?v=2" />
  <link rel="stylesheet" href="/frontend/style.css">
  <script src="club-config.js"></script>
  <script src="js/utils/session.js?v=2026-03-23-club-ops-recovery-01"></script>
  <style>
    :root {
      --ucc-olive: #5a7a3a;
      --ucc-olive-dark: #4e6a31;
      --ucc-sage: #e6ecd6;
      --ucc-cream: #f6f4ec;
      --ucc-orange: #f28c2c;
      --ucc-gold: #f5c542;
      --ucc-ink: #1f2a1b;
      --ucc-muted: #6c7b66;
      --ucc-border: #d9dfc9;
      --ucc-card: #ffffff;
      --ucc-shadow: 0 12px 30px rgba(31, 42, 27, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #f6f4ec 0%, #e6ecd6 45%, #f6f4ec 100%);
      min-height: 100vh;
      color: var(--ucc-ink);
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
    }

    body.embedded {
      background: #f6f4ec;
    }

    body.embedded .tsheet-header,
    body.embedded .selectors,
    body.embedded .sheet-actions .non-embed {
      display: none;
    }

    body.embedded .tsheet-container {
      max-width: 100%;
      width: 100%;
      margin: 0;
      padding: 16px;
    }

    body.embedded .empty-state .action-btn {
      display: none;
    }

    body.player .admin-only {
      display: none !important;
    }

	    .tsheet-container {
	      position: relative;
	      top: auto;
	      left: auto;
	      transform: none;
	      max-width: 1440px;
	      width: calc(100% - 32px);
	      margin: 18px auto 32px;
	      padding: 0 0 18px;
	      min-height: 100vh;
	      background: transparent;
	    }

    .tsheet-header {
      display: flex;
      align-items: center;
      padding: 18px 24px;
      background: linear-gradient(135deg, #f6f4ec 0%, #e6ecd6 100%);
      border: 1px solid var(--ucc-border);
      border-radius: 20px;
      box-shadow: var(--ucc-shadow);
      gap: 16px;
    }

    .club-logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--ucc-border);
      object-fit: cover;
    }

    .back-btn {
      width: 44px;
      height: 44px;
      border: none;
      background: #ffffff;
      border-radius: 12px;
      font-size: 22px;
      color: var(--ucc-olive-dark);
      cursor: pointer;
      padding: 0;
      box-shadow: 0 6px 14px rgba(31, 42, 27, 0.12);
    }

    .header-info {
      margin-left: 4px;
    }

    .club-name {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ucc-muted);
      margin: 0;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--ucc-ink);
      margin: 0;
    }

    .selectors {
      display: flex;
      gap: 15px;
      padding: 18px 6px 8px;
    }

    .selector-btn {
      flex: 1;
      padding: 16px 18px;
      border: 1px solid var(--ucc-border);
      border-radius: 16px;
      background: var(--ucc-card);
      cursor: pointer;
      text-align: center;
      box-shadow: 0 8px 20px rgba(31, 42, 27, 0.08);
    }

    .selector-btn.active {
      border-color: var(--ucc-olive);
      box-shadow: 0 8px 20px rgba(90, 122, 58, 0.2);
    }

    .selector-btn .main-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--ucc-olive-dark);
    }

    .selector-btn .sub-text {
      font-size: 12px;
      color: var(--ucc-muted);
    }

    .booking-window-banner {
      margin: 10px 6px 2px;
      padding: 10px 14px;
      background: #f3f7ea;
      border: 1px solid var(--ucc-border);
      border-radius: 14px;
      font-size: 13px;
      color: var(--ucc-olive-dark);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .booking-window-banner span {
      font-weight: 700;
    }

    .sheet-actions {
      display: flex;
      gap: 12px;
      padding: 4px 6px 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .action-btn {
      padding: 10px 18px;
      border-radius: 14px;
      border: 1px solid var(--ucc-border);
      background: #fff;
      color: var(--ucc-olive-dark);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(31, 42, 27, 0.08);
    }

    .action-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }

    .action-btn.primary {
      background: var(--ucc-olive);
      color: #fff;
      border-color: var(--ucc-olive);
    }

    .action-btn.ghost {
      background: #fff;
      border-style: dashed;
      color: var(--ucc-olive-dark);
    }

    .action-note {
      font-size: 12px;
      color: var(--ucc-muted);
      margin-left: auto;
    }

    .table-wrap {
      border-radius: 18px;
      border: 1px solid var(--ucc-border);
      background: #fff;
      overflow: hidden;
      box-shadow: 0 14px 30px rgba(31, 42, 27, 0.08);
    }

    .sheet-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .sheet-table th {
      background: #f3f7ea;
      color: var(--ucc-olive-dark);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 11px;
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid var(--ucc-border);
    }

	    .sheet-table thead th {
	      position: static;
	    }

    .sheet-table td {
      padding: 12px;
      border-bottom: 1px solid #edf0e4;
      vertical-align: top;
      background: #fff;
    }

    .time-col {
      width: 110px;
      font-weight: 700;
      color: var(--ucc-ink);
      font-size: 15px;
    }

    .tee-col {
      width: 70px;
      font-weight: 700;
      color: var(--ucc-olive-dark);
    }

	    .slot-card {
	      --slot-accent: var(--ucc-border);
	      --status-fg: rgba(31, 42, 27, 0.72);
	      --status-bg: rgba(31, 42, 27, 0.06);
	      border-radius: 14px;
	      border: 1px solid #dbe5d6;
	      border-left: 4px solid var(--slot-accent);
	      padding: 10px 12px;
	      background: #ffffff;
	      overflow: hidden;
	      min-height: 70px;
	      display: flex;
	      flex-direction: column;
	      gap: 6px;
      box-shadow: 0 1px 2px rgba(31, 42, 27, 0.06);
      transition: box-shadow 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
    }

	    .slot-card.open {
	      --slot-accent: #1d4ed8;
	      --status-fg: #1d4ed8;
	      --status-bg: rgba(29, 78, 216, 0.12);
	      background: rgba(29, 78, 216, 0.06);
	      border-color: rgba(29, 78, 216, 0.28);
	      cursor: pointer;
	    }

	    .slot-card.booked {
	      --slot-accent: #b45309;
	      --status-fg: #92400e;
	      --status-bg: rgba(180, 83, 9, 0.12);
	      background: #ffffff;
	      border-color: rgba(180, 83, 9, 0.26);
	      cursor: pointer;
	    }

	    .slot-card.checked-in {
	      --slot-accent: #047857;
	      --status-fg: #047857;
	      --status-bg: rgba(4, 120, 87, 0.12);
	      background: #ffffff;
	      border-color: rgba(4, 120, 87, 0.26);
	      cursor: pointer;
	    }

	    .slot-card.completed {
	      --slot-accent: #6d28d9;
	      --status-fg: #6d28d9;
	      --status-bg: rgba(109, 40, 217, 0.12);
	      background: #ffffff;
	      border-color: rgba(109, 40, 217, 0.26);
	      cursor: pointer;
	    }

	    .slot-card.no-show {
	      --slot-accent: #be123c;
	      --status-fg: #be123c;
	      --status-bg: rgba(190, 18, 60, 0.12);
	      background: #ffffff;
	      border-color: rgba(190, 18, 60, 0.26);
	    }

	    .slot-card.cancelled {
	      --slot-accent: #475569;
	      --status-fg: #475569;
	      --status-bg: rgba(71, 85, 105, 0.12);
	      background: #ffffff;
	      border-color: rgba(71, 85, 105, 0.22);
	      opacity: 0.85;
	    }

	    .slot-card.closed {
	      --slot-accent: #94a3b8;
	      --status-fg: #64748b;
	      --status-bg: rgba(148, 163, 184, 0.12);
	      background: #fbfbf8;
	      border-style: dashed;
	      border-left-style: solid;
	      color: #9aa391;
    }

    .slot-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

	    .slot-status {
	      font-size: 11px;
	      text-transform: uppercase;
	      letter-spacing: 0.08em;
	      color: var(--status-fg);
	      font-weight: 800;
	      display: inline-flex;
	      align-items: center;
	      min-width: 0;
	      max-width: calc(100% - 46px);
	      overflow: hidden;
	      text-overflow: ellipsis;
	      white-space: nowrap;
	      padding: 2px 8px;
	      border-radius: 999px;
	      background: var(--status-bg);
	    }

	    .slot-status::before {
	      content: "";
	      width: 8px;
	      height: 8px;
	      border-radius: 50%;
	      background: var(--slot-accent);
	      margin-right: 6px;
	      flex: 0 0 auto;
	    }

	    .slot-card:hover:not(.closed) {
	      box-shadow: 0 10px 26px rgba(31, 42, 27, 0.10);
	      transform: translateY(-1px);
	    }

	    .slot-card[draggable="true"],
	    .tee-slot[draggable="true"] {
	      cursor: grab;
	    }

		    .slot-card.dragging,
		    .tee-slot.dragging {
		      opacity: 0.55;
		      transform: scale(0.99);
		    }

		    .slot-card.just-moved,
		    .tee-slot.just-moved {
		      animation: slotPop 260ms ease-out;
		    }

		    @keyframes slotPop {
		      from {
		        transform: scale(0.985);
		        box-shadow: 0 0 0 rgba(31, 42, 27, 0);
		      }
		      to {
		        transform: scale(1);
		        box-shadow: 0 10px 26px rgba(31, 42, 27, 0.10);
		      }
		    }

		    .slot-card.drop-hover,
		    .tee-slot.drop-hover {
		      outline: 2px solid rgba(29, 78, 216, 0.65);
		      box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.14);
		    }

	    body.drag-active .slot-card.open,
	    body.drag-active .tee-slot.open {
	      border-style: dashed;
	      background: rgba(29, 78, 216, 0.08);
	    }

	    .slot-name {
	      font-weight: 700;
	      color: var(--ucc-ink);
	      font-size: 14px;
	      overflow: hidden;
	      display: -webkit-box;
	      -webkit-line-clamp: 2;
	      -webkit-box-orient: vertical;
	    }

	    .slot-meta {
	      font-size: 12px;
	      color: var(--ucc-muted);
	      overflow: hidden;
	      text-overflow: ellipsis;
	      white-space: nowrap;
	    }

	    .slot-action {
	      margin-top: auto;
	      align-self: flex-start;
	      font-size: 12px;
	      font-weight: 700;
	      color: var(--ucc-olive-dark);
	      text-decoration: underline;
	      overflow: hidden;
	      text-overflow: ellipsis;
	      white-space: nowrap;
	    }

	    .slot-card.open .slot-action {
	      color: #1d4ed8;
	    }

	    .slot-card.open .slot-name::before {
	      content: "";
	      width: 10px;
	      height: 10px;
	      border-radius: 999px;
	      background: var(--slot-accent);
	      display: inline-block;
	      margin-right: 8px;
	      vertical-align: middle;
	    }

    .empty-row td {
      padding: 28px;
      background: #fbfbf7;
    }

    .empty-state {
      padding: 32px;
      border-radius: 16px;
      border: 1px dashed var(--ucc-border);
      text-align: center;
      color: var(--ucc-muted);
      background: rgba(255, 255, 255, 0.7);
    }

    .empty-state h3 {
      margin: 0 0 8px;
      color: var(--ucc-olive-dark);
    }

    .empty-state p {
      margin: 0 0 18px;
    }

    .tee-card-list {
      display: none;
      gap: 12px;
    }

    .tee-card {
      border: 1px solid var(--ucc-border);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
      box-shadow: var(--ucc-shadow);
      display: grid;
      gap: 10px;
    }

    .tee-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tee-card-header .time {
      font-weight: 700;
      font-size: 16px;
    }

    .tee-card-header .tee {
      font-weight: 700;
      color: var(--ucc-olive-dark);
      font-size: 13px;
    }

    .tee-card-slots {
      display: grid;
      gap: 8px;
    }

	    .tee-slot {
	      --slot-accent: #cbd5e1;
	      padding: 10px 12px;
	      border-radius: 12px;
	      border: 1px solid #dbe5d6;
	      border-left: 4px solid var(--slot-accent);
	      background: #ffffff;
	      display: flex;
	      justify-content: space-between;
	      align-items: center;
	      font-size: 13px;
	      box-shadow: 0 1px 2px rgba(31, 42, 27, 0.06);
	    }

	    .tee-slot.open { --slot-accent: #1d4ed8; cursor: pointer; background: rgba(29, 78, 216, 0.06); border-color: rgba(29, 78, 216, 0.28); }
	    .tee-slot.booked { --slot-accent: #b45309; background: #ffffff; border-color: rgba(180, 83, 9, 0.26); }
	    .tee-slot.checked-in { --slot-accent: #047857; background: #ffffff; border-color: rgba(4, 120, 87, 0.26); }
	    .tee-slot.completed { --slot-accent: #6d28d9; background: #ffffff; border-color: rgba(109, 40, 217, 0.26); }
	    .tee-slot.no-show { --slot-accent: #be123c; background: #ffffff; border-color: rgba(190, 18, 60, 0.26); }
	    .tee-slot.cancelled { --slot-accent: #475569; background: #ffffff; border-color: rgba(71, 85, 105, 0.22); opacity: 0.85; }
	    .tee-slot.closed { color: #9aa391; }

    .tee-slot .label {
      font-weight: 700;
    }

	    .tee-slot .meta {
	      color: var(--ucc-muted);
	      font-size: 12px;
	    }

	    /* ------------------------------------------------------------------
	       Player View: Compact / Professional
	       ------------------------------------------------------------------ */
	    body.player {
	      font-family: "Aptos", "Segoe UI Variable Text", "Segoe UI", system-ui, -apple-system, sans-serif;
	    }

	    body.player:not(.embedded) {
	      background: linear-gradient(180deg, #f8f6ef 0%, #eef2e4 35%, #f8f6ef 100%);
	    }

	    body.player .tsheet-header {
	      padding: 14px 16px;
	      border-radius: 18px;
	      box-shadow: 0 10px 24px rgba(31, 42, 27, 0.10);
	    }

	    body.player .page-title {
	      font-size: 18px;
	    }

	    body.player .selectors {
	      gap: 10px;
	      padding: 14px 6px 8px;
	    }

	    body.player .selector-btn {
	      padding: 12px 14px;
	      border-radius: 14px;
	      box-shadow: 0 8px 18px rgba(31, 42, 27, 0.06);
	    }

	    body.player .selector-btn .main-text {
	      font-size: 16px;
	    }

	    body.player .selector-btn .sub-text {
	      font-size: 11px;
	    }

	    body.player .booking-window-banner {
	      margin: 8px 6px 2px;
	      padding: 0 6px;
	      border: none;
	      background: transparent;
	      box-shadow: none;
	      font-size: 12px;
	    }

	    body.player .sheet-actions {
	      gap: 8px;
	      padding: 4px 6px 10px;
	    }

		    body.player .action-btn {
		      padding: 8px 12px;
		      border-radius: 12px;
		      font-size: 12px;
		      box-shadow: 0 6px 14px rgba(31, 42, 27, 0.06);
		    }

		    /* Players use the same tee-sheet table layout on desktop.
		       On smaller screens, the responsive rules below switch to cards. */
	
		    body.player .tee-card {
		      border-radius: 14px;
		      padding: 12px 14px;
		      box-shadow: 0 12px 26px rgba(31, 42, 27, 0.08);
	      display: flex;
	      align-items: center;
	      justify-content: space-between;
	      gap: 14px;
	    }

	    body.player .tee-card-header {
	      display: flex;
	      flex-direction: column;
	      gap: 2px;
	      min-width: 110px;
	    }

	    body.player .tee-card-header .time {
	      font-size: 15px;
	    }

	    body.player .tee-card-header .tee {
	      font-size: 11px;
	      text-transform: uppercase;
	      letter-spacing: 0.08em;
	      color: var(--ucc-muted);
	    }

	    .tee-chip-grid {
	      display: grid;
	      grid-template-columns: repeat(4, minmax(0, 1fr));
	      gap: 8px;
	    }

	    body.player .tee-chip-grid {
	      width: min(340px, 100%);
	    }

	    .tee-chip {
	      appearance: none;
	      border: 1px solid var(--ucc-border);
	      border-radius: 14px;
	      padding: 10px 10px;
	      background: #fff;
	      color: var(--ucc-ink);
	      text-align: center;
	      cursor: pointer;
	      box-shadow: 0 8px 18px rgba(31, 42, 27, 0.06);
	      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
	      display: grid;
	      gap: 4px;
	      min-height: 54px;
	    }

	    body.player .tee-chip {
	      padding: 8px 8px;
	      border-radius: 12px;
	      min-height: 46px;
	    }

	    .tee-chip .num {
	      font-weight: 800;
	      font-size: 14px;
	      letter-spacing: 0.02em;
	    }

	    .tee-chip .tag {
	      font-size: 11px;
	      color: var(--ucc-muted);
	      text-transform: uppercase;
	      letter-spacing: 0.08em;
	    }

	    body.player .tee-chip .tag {
	      font-size: 10px;
	    }

	    .tee-chip.open {
	      background: #ffffff;
	      border-color: rgba(90, 122, 58, 0.45);
	    }

	    .tee-chip.open:hover {
	      border-color: var(--ucc-olive);
	      box-shadow: 0 12px 26px rgba(31, 42, 27, 0.10);
	      transform: translateY(-1px);
	    }

	    .tee-chip.booked {
	      background: #f5f5f2;
	      border-color: #d8ddd6;
	      cursor: default;
	      box-shadow: none;
	    }

	    .tee-chip.closed {
	      background: #f7f7f4;
	      border-style: dashed;
	      color: #9aa391;
	      cursor: default;
	      box-shadow: none;
	    }

	    .tee-chip:disabled {
	      opacity: 0.9;
	    }

	    @media (max-width: 560px) {
	      body.player .tee-card {
	        flex-wrap: wrap;
	        align-items: flex-start;
	      }

	      body.player .tee-chip-grid {
	        width: 100%;
	      }
	    }

      display: flex;

    .legend-item {

		const API_PREFIX = '/tsheet';

		if(!token) location.href='/frontend/index.html';
			let bootstrap = null;
			let role = String(localStorage.getItem('user_role') || 'player').trim().toLowerCase();
			let roleShell = '';
			let isAdmin = role === 'admin';
			let isSuperAdmin = role === 'super_admin';
			let isStaff = role === 'club_staff' || isAdmin;
			let isMember = role === 'player';

			function syncRoleStateFromBootstrap(nextBootstrap) {
			  bootstrap = nextBootstrap && typeof nextBootstrap === 'object' ? nextBootstrap : bootstrap;
			  roleShell = String(bootstrap?.role_shell || '').trim().toLowerCase();
			  role = String(bootstrap?.user?.role || localStorage.getItem('user_role') || role || 'player').trim().toLowerCase();
			  isAdmin = roleShell === 'club_admin' || role === 'admin';
			  isSuperAdmin = roleShell === 'super_admin' || role === 'super_admin';
			  isStaff = roleShell === 'staff' || role === 'club_staff' || isAdmin;
			  isMember = roleShell === 'member' || role === 'player';

			  try {
			    if (role) localStorage.setItem('user_role', role);
			    const activeClubId = Number(bootstrap?.effective_club?.id || bootstrap?.preview_club?.id || 0);
			    if (activeClubId > 0) localStorage.setItem('active_club_id', String(activeClubId));
			  } catch {}

			  document.body.classList.remove('admin', 'player');
			  document.body.classList.add(isAdmin || isStaff ? 'admin' : 'player');
			}

			function sessionLandingPath(fallback) {
			  const resolved = String(bootstrap?.landing_path || fallback || '').trim();
			  return resolved || '/frontend/index.html';
			}

			function redirectToSessionLanding(fallback) {
			  window.location.replace(sessionLandingPath(fallback));
			}

			async function ensureClubOpsBootstrap() {
			  const sessionApi = window.GreenLinkSession;
			  const cached = sessionApi?.readBootstrap?.() || null;
			  if (cached) {
			    syncRoleStateFromBootstrap(cached);
			    return cached;
			  }
			  if (!sessionApi?.fetchBootstrap) return null;

			  try {
			    const fresh = await sessionApi.fetchBootstrap();
			    const normalized = sessionApi.writeBootstrap ? sessionApi.writeBootstrap(fresh) : fresh;
			    syncRoleStateFromBootstrap(normalized);
			    return normalized;
			  } catch (error) {
			    console.error('Club ops bootstrap failed', error);
			    if (Number(error?.status || 0) === 401 || error?.code === 'INVALID_BOOTSTRAP') {
			      sessionApi?.clearSessionState?.();
			      bootstrap = null;
			      role = '';
			      roleShell = '';
			      isAdmin = false;
			      isSuperAdmin = false;
			      isStaff = false;
			      isMember = false;
			      redirectToSessionLanding('/frontend/index.html');
			    }
			    return null;
			  }
			}

			syncRoleStateFromBootstrap(window.GreenLinkSession?.readBootstrap?.() || null);

		(function installAuthFetch() {
		  const originalFetch = window.fetch.bind(window);
		  window.fetch = (input, init) => {
		    let url = "";
		    if (typeof input === "string") url = input;
		    else if (input && typeof input.url === "string") url = input.url;

		    try {
		      const resolved = new URL(url, window.location.origin);
		      if (resolved.origin !== window.location.origin) {
		        return originalFetch(input, init);
		      }
		    } catch {
		      return originalFetch(input, init);
		    }

		    const nextInit = init ? { ...init } : {};
		    const headers = new Headers(nextInit.headers || {});
		    if (!headers.has("Authorization")) {
		      headers.set("Authorization", `Bearer ${token}`);
		    }

		    const activeClubId = localStorage.getItem("active_club_id");
		    if (isSuperAdmin && activeClubId && !headers.has("X-Club-Id")) {
		      headers.set("X-Club-Id", String(activeClubId));
		    }

		    nextInit.headers = headers;
		    return originalFetch(input, nextInit);
		  };
		})();

		async function ensureActiveClubIdForSuperAdmin() {
		  if (!isSuperAdmin) return;
		  const existing = localStorage.getItem("active_club_id");
		  if (existing) return;
		  try {
		    const res = await fetch("/api/super/clubs", {
		      headers: { Authorization: `Bearer ${token}` }
		    });
		    if (!res.ok) return;
		    const clubs = await res.json();
		    const active = (Array.isArray(clubs) ? clubs : []).filter(c => c && (c.active === 1 || c.active === true));
		    if (active.length) {
		      localStorage.setItem("active_club_id", String(active[0].id));
		    }
		  } catch {
		    // Non-blocking
		  }
		}

// Format time for display


function buildDateTime(baseDate, timeStr) {
  const [h, m] = timeStr.split(':');
  const d = new Date(baseDate);
  d.setHours(parseInt(h), parseInt(m), 0, 0);
  return d;
}

function dateToYMD(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function buildRangeForDay(date) {
  const startYMD = dateToYMD(date);
  const nextDay = new Date(date);
  nextDay.setDate(nextDay.getDate() + 1);
  const endYMD = dateToYMD(nextDay);
  return {
    start: `${startYMD}T00:00:00`,
    end: `${endYMD}T00:00:00`
  };
}

function formatBannerDate(date) {
  try {
    return new Date(date).toLocaleDateString('en-GB');
  } catch (e) {
    return '';
  }
}

function updateBookingWindowBanner() {
  const labelEl = document.getElementById('booking-window-label');
  const rangeEl = document.getElementById('booking-window-range');
  if (!labelEl || !rangeEl) return;
  const label = typeLabels[bookingWindowType] || 'Visitor';
  labelEl.textContent = `Booking window: ${bookingWindowDays} days (${label})`;
  if (bookingWindowMaxDate) {
    rangeEl.textContent = `Book through ${formatBannerDate(bookingWindowMaxDate)}`;
  } else {
    rangeEl.textContent = '';
  }
}

async function loadBookingWindow() {

    const res = await fetch('/settings/booking-window', { headers: { 'Authorization': 'Bearer ' + token }});
    if (!res.ok) return;
    const data = await res.json();
    bookingWindowDays = Number.isFinite(data.window_days) ? data.window_days : bookingWindowDays;
    bookingWindowType = data.player_type || bookingWindowType;
	    if (data.max_date) {

	    }
	    updateBookingWindowBanner();
  } catch (e) {
    // Non-blocking
  }
}

function floorToInterval(dateObj, intervalMin) {
  const d = new Date(dateObj);
  const mins = d.getMinutes();
  d.setSeconds(0, 0);
  d.setMinutes(Math.floor(mins / intervalMin) * intervalMin);
  return d;
}

function isPastTeeTime(teeTimeIso) {
  const today0 = new Date();
  today0.setHours(0, 0, 0, 0);

  const selected0 = new Date(selectedDate);
  selected0.setHours(0, 0, 0, 0);

  // Past days: all times closed. Future days: all open.
  if (selected0.getTime() < today0.getTime()) return true;
  if (selected0.getTime() > today0.getTime()) return false;

  // Today: closed if earlier than current interval floor (e.g. 11:05 => 11:00).
  const threshold = floorToInterval(new Date(), DEFAULT_INTERVAL_MIN);
  return new Date(teeTimeIso) < threshold;
}

}

// Format date for display
function formatDateDisplay(date) {
  const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  
  const today = new Date();
  today.setHours(0,0,0,0);
  const checkDate = new Date(date);
  checkDate.setHours(0,0,0,0);
  
  const dayName = days[date.getDay()];
  const dd = String(date.getDate()).padStart(2, '0');
  const mm = String(date.getMonth() + 1).padStart(2, '0');
  const yy = String(date.getFullYear()).slice(2);
  const dateStr = `${dd}/${mm}/${yy}`;
  
  if (checkDate.getTime() === today.getTime()) {
    return { day: 'Today', date: dateStr };
  }
  
  const tomorrow = new Date(today);
  tomorrow.setDate(tomorrow.getDate() + 1);
  if (checkDate.getTime() === tomorrow.getTime()) {
    return { day: 'Tomorrow', date: dateStr };
  }
  
  return { day: dayName, date: dateStr };
}

// Update date display
function updateDateDisplay() {
  const display = formatDateDisplay(selectedDate);
  document.getElementById('selected-day').textContent = display.day;
  document.getElementById('selected-date').textContent = display.date;
}

function resetPageStartIndex() {

    return;

  // Default: start at beginning for non-today dates.

  const checkDate = new Date(selectedDate);
  checkDate.setHours(0, 0, 0, 0);
  if (checkDate.getTime() !== today.getTime()) {
    pageStartIndex = 0;
    return;
  }

  const threshold = floorToInterval(new Date(), DEFAULT_INTERVAL_MIN);
  let idx = list.findIndex(tt => new Date(tt.tee_time) >= threshold);
  if (idx < 0) idx = Math.max(0, list.length - PAGE_SIZE);
  const maxStart = Math.max(0, list.length - PAGE_SIZE);
  pageStartIndex = Math.min(Math.max(0, idx), maxStart);
}

function updatePagerInfo(total, shown) {
  const info = document.getElementById('page-info');
  const earlier = document.getElementById('earlier-btn');
  const later = document.getElementById('later-btn');
  if (!info || !earlier || !later) return;

  if (total === 0) {
    info.textContent = 'No tee times';
    earlier.disabled = true;
    later.disabled = true;
    return;
  }

  const start = Math.min(total, pageStartIndex + 1);
  const end = Math.min(total, pageStartIndex + shown);
  info.textContent = `Showing ${start}\u2013${end} of ${total}`;

  earlier.disabled = pageStartIndex <= 0;
  later.disabled = pageStartIndex + shown >= total;
}

function viewEarlier() {
  pageStartIndex = Math.max(0, pageStartIndex - PAGE_SIZE);
  renderTeeTimes();
}

function viewLater() {
  const total = Array.isArray(allTeeTimes) ? allTeeTimes.length : 0;
  const maxStart = Math.max(0, total - PAGE_SIZE);
  pageStartIndex = Math.min(maxStart, pageStartIndex + PAGE_SIZE);
  renderTeeTimes();
}

function renderDatePicker() {
  const container = document.getElementById('datePickerBody');
  const today = new Date();
  const days = [];
  
  const windowCount = Math.max(1, (Number.isFinite(bookingWindowDays) ? bookingWindowDays : 14) + 1);
  for (let i = 0; i < windowCount; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    days.push(d);
  }
  
  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  
  let html = '<div class="date-picker-grid">';
  
  // Day name headers
  dayNames.forEach(name => {
    html += `<div style="text-align: center; font-size: 11px; color: #888; padding: 5px;">${name}</div>`;
  });
  
  // Add empty cells for alignment
  const firstDayOfWeek = days[0].getDay();
  for (let i = 0; i < firstDayOfWeek; i++) {
    html += '<div></div>';
  }
  
  days.forEach(d => {
    const isToday = d.toDateString() === today.toDateString();
    const isSelected = d.toDateString() === selectedDate.toDateString();
    let classes = 'date-picker-day';
    if (isToday) classes += ' today';
    if (isSelected) classes += ' selected';
    
    html += `<div class="${classes}" onclick="selectDate('${d.toISOString()}')">${d.getDate()}</div>`;
  });
  
  html += '</div>';
  container.innerHTML = html;
}

      if (ok) created++;
    }

  } catch (e) {
    alert('Failed to generate tee times');

      button.textContent = 'Generate Day Tee Sheet';
    }
  }

		      el.className = "tee-slot closed";
		      el.innerHTML = `
		        <div>
		          <div class="label">Slot ${slot}</div>
		          <div class="meta">Past time</div>
		        </div>
		      `;
		      return el;
		    }
		    el.className = "tee-slot open";
		    el.dataset.teeTimeId = String(id);
		    el.setAttribute("onclick", `openBookingForm(${id}, ${slot})`);
		    el.innerHTML = `
		      <div>
		        <div class="label">Slot ${slot}</div>
		        <div class="meta">Available</div>
		      </div>
		      <div class="meta">Add player</div>
		    `;
		    return el;
		  }

		  return null;
		}

		function setupTeeSheetDragDrop() {
		  if (!isStaff) return;
		  if (window.__greenlink_tsheet_dragdrop_setup) return;
		  window.__greenlink_tsheet_dragdrop_setup = true;

	  let activeDrag = null;
	  let suppressClicksUntil = 0;
	  let hoverEl = null;
	  let dragScrollRaf = null;

	  const clearHover = () => {
	    if (hoverEl) hoverEl.classList.remove('drop-hover');
	    hoverEl = null;
	  };

	  const autoScrollWindow = (clientY) => {
	    const edge = 64;
	    const speed = 22;
	    const distTop = clientY;
	    const distBottom = window.innerHeight - clientY;
	    let delta = 0;
	    if (distTop >= 0 && distTop < edge) delta = -speed;
	    else if (distBottom >= 0 && distBottom < edge) delta = speed;
	    if (!delta) return;
	    if (dragScrollRaf) cancelAnimationFrame(dragScrollRaf);
	    dragScrollRaf = requestAnimationFrame(() => window.scrollBy(0, delta));
	  };

	  document.addEventListener('dragstart', (e) => {
	    const card = e.target?.closest?.('.slot-card[draggable="true"], .tee-slot[draggable="true"]');
	    if (!card) return;
	    const bookingId = parseInt(card.dataset.bookingId || '', 10);
	    const fromTeeTimeId = parseInt(card.dataset.teeTimeId || '', 10);
	    if (!Number.isFinite(bookingId) || !Number.isFinite(fromTeeTimeId)) return;

	    activeDrag = { bookingId, fromTeeTimeId };
	    try {
	      e.dataTransfer.setData('text/plain', String(bookingId));
	      e.dataTransfer.effectAllowed = 'move';
	    } catch {}
	    card.classList.add('dragging');
	    document.body.classList.add('drag-active');
	  }, true);

	  document.addEventListener('dragend', (e) => {
	    const card = e.target?.closest?.('.slot-card, .tee-slot');
	    if (card) card.classList.remove('dragging');
	    activeDrag = null;
	    clearHover();
	    document.body.classList.remove('drag-active');
	  }, true);

	  document.addEventListener('dragover', (e) => {
	    if (!activeDrag) return;
	    const target = e.target?.closest?.('.slot-card.open[data-tee-time-id], .tee-slot.open[data-tee-time-id]');
	    if (!target) {
	      clearHover();
	      autoScrollWindow(e.clientY);
	      return;
	    }
	    const toTeeTimeId = parseInt(target.dataset.teeTimeId || '', 10);
	    if (!Number.isFinite(toTeeTimeId) || toTeeTimeId === activeDrag.fromTeeTimeId) {
	      clearHover();
	      autoScrollWindow(e.clientY);
	      return;
	    }

	    e.preventDefault();
	    autoScrollWindow(e.clientY);
	    try { e.dataTransfer.dropEffect = 'move'; } catch {}
	    if (hoverEl !== target) {
	      clearHover();
	      hoverEl = target;
	      hoverEl.classList.add('drop-hover');
	    }
	  }, true);

		  document.addEventListener('drop', async (e) => {
		    if (!activeDrag) return;
		    const target = e.target?.closest?.('.slot-card.open[data-tee-time-id], .tee-slot.open[data-tee-time-id]');
		    if (!target) return;

	    const toTeeTimeId = parseInt(target.dataset.teeTimeId || '', 10);
	    if (!Number.isFinite(toTeeTimeId) || toTeeTimeId === activeDrag.fromTeeTimeId) return;

		    e.preventDefault();
		    e.stopPropagation();
		    clearHover();

		    // Prevent the drop from also triggering the open-slot click (set early, before awaits).
		    suppressClicksUntil = Date.now() + 800;

		    let revertFns = [];
			    try {
			      // Optimistic UI: move in DOM immediately (no full refresh).
			      const bookingId = activeDrag.bookingId;
			      const fromTeeTimeId = activeDrag.fromTeeTimeId;
			      const fromIso = _teeTimeIsoById(fromTeeTimeId);
			      const closed = fromIso ? isPastTeeTime(fromIso) : false;

			      // Table view
			      const fromCard = document.querySelector(`.slot-card[data-booking-id="${bookingId}"]`);
			      const toCard = document.querySelector(`.slot-card.open[data-tee-time-id="${toTeeTimeId}"]`);
			      if (fromCard && toCard) {
			        const fromTd = fromCard.closest("td");
			        const toTd = toCard.closest("td");
			        if (fromTd && toTd) {
			          const fromBackup = fromTd.innerHTML;
			          const toBackup = toTd.innerHTML;
			          revertFns.push(() => { fromTd.innerHTML = fromBackup; toTd.innerHTML = toBackup; });

			          const slotNumber = _slotNumberFromSlotCard(fromCard) || 1;
			          const placeholder = _buildSlotPlaceholder("slot-card", fromTeeTimeId, slotNumber, closed);
			          if (!placeholder) throw new Error("Unable to move booking");

			          const moved = fromCard.cloneNode(true);
			          moved.classList.remove("dragging");
			          moved.classList.add("just-moved");
			          moved.dataset.teeTimeId = String(toTeeTimeId);
			          fromCard.replaceWith(placeholder);
			          toCard.replaceWith(moved);

			          _updateOpenLabelsInTableRow(fromTd.closest("tr"));
			          _updateOpenLabelsInTableRow(toTd.closest("tr"));

			          setTimeout(() => { try { moved.classList.remove("just-moved"); } catch {} }, 320);
			        }
			      }

			      // Card view
			      const fromSlot = document.querySelector(`.tee-slot[data-booking-id="${bookingId}"]`);
			      const toSlot = document.querySelector(`.tee-slot.open[data-tee-time-id="${toTeeTimeId}"]`);
			      if (fromSlot && toSlot) {
			        const fromWrap = fromSlot.parentElement;
			        const toWrap = toSlot.parentElement;
			        if (fromWrap && toWrap) {
			          const fromBackup = fromWrap.innerHTML;
			          const toBackup = toWrap.innerHTML;
			          revertFns.push(() => { fromWrap.innerHTML = fromBackup; toWrap.innerHTML = toBackup; });

			          const slotNumber = _slotNumberFromTeeSlot(fromSlot) || 1;
			          const placeholder = _buildSlotPlaceholder("tee-slot", fromTeeTimeId, slotNumber, closed);
			          if (!placeholder) throw new Error("Unable to move booking");

			          const moved = fromSlot.cloneNode(true);
			          moved.classList.remove("dragging");
			          moved.classList.add("just-moved");
			          moved.dataset.teeTimeId = String(toTeeTimeId);
			          fromSlot.replaceWith(placeholder);
			          toSlot.replaceWith(moved);

			          _updateOpenLabelsInCardSlots(fromWrap);
			          _updateOpenLabelsInCardSlots(toWrap);

			          setTimeout(() => { try { moved.classList.remove("just-moved"); } catch {} }, 320);
			        }
			      }

			      await moveBookingToTeeTime(activeDrag.bookingId, toTeeTimeId);
			    } catch (err) {
			      try {
			        (revertFns || []).forEach(fn => { try { fn(); } catch {} });
			      } catch {}
			      alert(err?.message || 'Failed to move booking');
			    } finally {
		      activeDrag = null;
		    }
		  }, true);

	  document.addEventListener('click', (e) => {
	    if (Date.now() < suppressClicksUntil) {
	      const card = e.target?.closest?.('.slot-card, .tee-slot');
	      if (card) {
	        e.preventDefault();
	        e.stopPropagation();
	      }
	    }
	  }, true);
	}

async function checkIn(bookingId) {
  try {
    const res = await fetch('/checkin/' + bookingId, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    
    if (res.ok) {
      closeModal('bookingModal');
      alert('✓ Checked in successfully!');
	      loadTeeTimes({ preservePage: true, preserveScroll: true });
	    } else {
	      alert('Check-in failed');
	    }
  } catch(e) {
    alert('Check-in failed');
  }
}

		// Initialize
		(async () => {
		  await ensureClubOpsBootstrap();
		  if (isMember) {
		    const p = new URLSearchParams(window.location.search || "");
		    p.set("tab", "book");
		    const memberFallback = `/frontend/dashboard.html?${p.toString()}`;
		    redirectToSessionLanding(memberFallback);
		    return;
		  }
		  if (isSuperAdmin) {
		    redirectToSessionLanding('/frontend/admin.html?workspace=overview');
		    return;
		  }
		  if (!isAdmin && !isStaff) {
		    redirectToSessionLanding('/frontend/index.html');
		    return;
		  }

		  try {
		    clubConfig = await window.Greenlink?.loadClubConfig?.();
		    if (clubConfig?.labels) typeLabels = { ...typeLabels, ...clubConfig.labels };
		    if (clubConfig) window.Greenlink?.applyClubBranding?.(clubConfig);
		  } catch {}

	  setupTeeSheetDragDrop();
	  await loadBookingWindow();
	  updateDateDisplay();
	  await loadFees();
	  loadTeeTimes();
	})();
	</script>
