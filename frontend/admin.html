<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenLink Admin Dashboard</title>
    <meta name="theme-color" content="#06110c">
    <link rel="icon" type="image/png" href="assets/favicon.png?v=2">
    <link rel="shortcut icon" href="assets/favicon.png?v=2">
    <link rel="apple-touch-icon" href="assets/favicon.png?v=2">
    <link rel="stylesheet" href="admin-style.css?v=2026-03-24-shell-hotfix-26">
</head>
<body class="shell-loading">
    <div class="loading-overlay" id="loading-overlay" aria-live="polite">
        <div class="loading-card">
            <strong>Opening GreenLink</strong>
            <span>Resolving role, club context, and workspace.</span>
        </div>
    </div>

    <div class="shell-root">
        <aside class="shell-sidebar">
            <div class="sidebar-brand">
                <span class="sidebar-kicker" id="shell-brand-kicker">GreenLink</span>
                <h1 id="shell-brand-title">Operations</h1>
                <p id="shell-brand-copy">Fast, role-specific club operations.</p>
            </div>

            <nav class="shell-nav" id="shell-nav" aria-label="Primary navigation"></nav>

            <div class="sidebar-footer">
                <section class="scope-card">
                    <span class="scope-label">Current scope</span>
                    <strong id="scope-title">Loading...</strong>
                    <p id="scope-copy">Verifying session context.</p>
                </section>
                <button type="button" class="button secondary wide" id="logout-btn">Log out</button>
            </div>
        </aside>

        <div class="shell-main">
            <header class="shell-header">
                <div>
                    <p class="page-kicker" id="page-kicker">Workspace</p>
                    <h2 id="page-title">Loading workspace</h2>
                    <p class="page-copy" id="page-copy">Preparing role-specific navigation and club-safe data.</p>
                </div>
                <div class="header-meta">
                    <div class="context-chip" id="context-chip">Resolving session</div>
                    <div class="header-club" id="header-club">GreenLink</div>
                </div>
            </header>

            <div class="workspace-tabs" id="workspace-tabs" hidden></div>
            <main class="workspace-root" id="workspace-root"></main>
        </div>
    </div>

    <div class="modal-layer" id="modal-layer" hidden></div>
    <div class="toast-stack" id="toast-stack" aria-live="polite" aria-atomic="true"></div>

    <script src="js/utils/session.js?v=2026-03-23-shell-hotfix-02"></script>
    <script src="admin.js?v=2026-03-24-shell-hotfix-26"></script>
</body>
</html>
